<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transparency</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
        color: #cbd5e1;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .control {
        position: absolute;
        top: 5px;
        left: 0;
        display: grid;
        width: 220px;
        grid-template-columns: minmax(0, 1fr) 42px;
        align-items: center;
        gap: 3px 8px;
        border: 1px solid #3a2f47;
        border-radius: 6px;
        background: #10131a;
        color: #cbd5e1;
        font-size: 0.68rem;
        font-weight: 650;
        line-height: 1;
        padding: 4px 8px;
      }

      .control::before {
        position: absolute;
        top: -5px;
        left: 50%;
        width: 9px;
        height: 9px;
        border-top: 1px solid #3a2f47;
        border-left: 1px solid #3a2f47;
        background: #10131a;
        content: '';
        transform: translateX(-50%) rotate(45deg);
      }

      .control span {
        grid-column: 1;
      }

      .control input[type='range'] {
        width: 100%;
        height: 14px;
        grid-column: 1;
        margin: 0;
        appearance: none;
        background: transparent;
        cursor: default;
      }

      .control input[type='range']::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 999px;
        background: #6f58a0;
      }

      .control input[type='range']::-webkit-slider-thumb {
        width: 14px;
        height: 14px;
        margin-top: -5px;
        appearance: none;
        border: 2px solid #f7f2ff;
        border-radius: 50%;
        background: #9b7bd3;
      }

      .control input[type='range']:focus-visible {
        outline: 2px solid #1677c7;
        outline-offset: 2px;
      }

      .control output {
        grid-row: 1 / span 2;
        grid-column: 2;
        color: #f4f6f8;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <label class="control" aria-label="Transparency controls">
      <span>Opacity</span>
      <input id="opacity" type="range" min="40" max="100" step="5" value="100" />
      <output id="opacity-output">100%</output>
    </label>
    <script src="/transparency-overlay.js"></script>
  </body>
</html>
